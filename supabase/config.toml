project_id = "qyazcvhgvsxtkqfikpov"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
site_url = "https://meta-x.ai.kr"
additional_redirect_urls = ["https://meta-x.ai.kr", "https://meta-x.ai.kr/"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"

[auth.email.template.recovery]
subject = "[META-X] 비밀번호 재설정"
content_path = "./supabase/templates/recovery.html"
